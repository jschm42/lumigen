{% set p = form_profile %}
{% set action = form_action if form_action else '/profiles' %}
{% set form_dom_id = form_dom_id if form_dom_id else 'profile-form' %}
{% set model_field_id = model_field_id if model_field_id else form_dom_id ~ '-model-config' %}

<form action="{{ action }}" method="post" class="stack profile-form" id="{{ form_dom_id }}">
  <label for="{{ form_dom_id }}-name">Name</label>
  <input id="{{ form_dom_id }}-name" type="text" name="name" value="{{ p.name if p else '' }}" required>

  <label for="{{ model_field_id }}">Model</label>
  <select id="{{ model_field_id }}" name="model_config_id" required>
    <option value="">Select a model</option>
    {% for config in model_configs %}
      <option value="{{ config.id }}" {% if p and p.model_config_id == config.id %}selected{% endif %}>
        {{ config.name }} ({{ config.provider }} / {{ config.model }})
      </option>
    {% endfor %}
  </select>

  <label for="{{ form_dom_id }}-base-prompt">Base prompt (optional)</label>
  <textarea id="{{ form_dom_id }}-base-prompt" name="base_prompt" rows="3">{{ p.base_prompt if p else '' }}</textarea>

  <label for="{{ form_dom_id }}-negative-prompt">Negative prompt</label>
  <textarea id="{{ form_dom_id }}-negative-prompt" name="negative_prompt" rows="2">{{ p.negative_prompt if p and p.negative_prompt else '' }}</textarea>

  <div class="grid">
    <div>
      <label for="{{ form_dom_id }}-width">Width</label>
      <input id="{{ form_dom_id }}-width" type="number" name="width" value="{{ p.width if p and p.width else '' }}">
    </div>
    <div>
      <label for="{{ form_dom_id }}-height">Height</label>
      <input id="{{ form_dom_id }}-height" type="number" name="height" value="{{ p.height if p and p.height else '' }}">
    </div>
    <div>
      <label for="{{ form_dom_id }}-aspect">Aspect ratio</label>
      <input id="{{ form_dom_id }}-aspect" type="text" name="aspect_ratio" value="{{ p.aspect_ratio if p and p.aspect_ratio else '' }}" placeholder="1:1">
    </div>
  </div>

  <div class="grid">
    <div>
      <label for="{{ form_dom_id }}-n-images">Images per generation</label>
      <input id="{{ form_dom_id }}-n-images" type="number" min="1" max="8" name="n_images" value="{{ p.n_images if p else 1 }}" required>
    </div>
    <div>
      <label for="{{ form_dom_id }}-seed">Seed</label>
      <input id="{{ form_dom_id }}-seed" type="number" name="seed" value="{{ p.seed if p and p.seed is not none else '' }}">
    </div>
  </div>

  <label for="{{ form_dom_id }}-format">Output format</label>
  <select id="{{ form_dom_id }}-format" name="output_format" required>
    {% set selected_format = p.output_format if p else 'png' %}
    <option value="png" {% if selected_format == 'png' %}selected{% endif %}>png</option>
    <option value="jpg" {% if selected_format == 'jpg' %}selected{% endif %}>jpg</option>
    <option value="webp" {% if selected_format == 'webp' %}selected{% endif %}>webp</option>
  </select>

  <label for="{{ form_dom_id }}-params">params_json</label>
  <textarea id="{{ form_dom_id }}-params" name="params_json" rows="4">{{ p.params_json | tojson if p else '{}' }}</textarea>

  <label for="{{ form_dom_id }}-storage">Storage template</label>
  <select id="{{ form_dom_id }}-storage" name="storage_template_id" required>
    {% for st in storage_templates %}
    <option value="{{ st.id }}" {% if p and p.storage_template_id == st.id %}selected{% endif %}>{{ st.name }} :: {{ st.base_dir }}</option>
    {% endfor %}
  </select>

  <div class="actions">
    <button type="submit">{{ submit_label if submit_label else ("Update" if p else "Create") }}</button>
    {% if cancel_url %}
      <a role="button" class="secondary" href="{{ cancel_url }}">Cancel</a>
    {% endif %}
  </div>
</form>

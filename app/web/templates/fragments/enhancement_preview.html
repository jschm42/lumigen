<article class="space-y-4">
    <header class="flex items-center justify-between gap-4">
        <div>
            <h3 class="text-lg font-semibold text-slate-900 dark:text-white">Prompt Enhancement Preview</h3>
            <p class="text-sm text-slate-600 dark:text-slate-400">Review the changes made by the AI.</p>
        </div>
    </header>

    <div class="space-y-3">
        <!-- Diff section -->
        <div class="rounded-2xl border border-slate-300/70 bg-slate-50 p-4 dark:border-white/10 dark:bg-slate-950/35">
            <h4 class="mb-2 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Changes (Visual Diff)</h4>
            <div class="text-sm leading-relaxed text-slate-800 dark:text-slate-200 whitespace-pre-wrap">
                {{ diff_html | safe }}
            </div>
        </div>

        <!-- Explanation section -->
        <div class="rounded-2xl border border-sky-200 bg-sky-50/50 p-4 dark:border-sky-900/30 dark:bg-sky-900/10">
            <h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-sky-700 dark:text-sky-400">AI Explanation</h4>
            <p class="text-sm text-slate-700 dark:text-slate-300">{{ explanation }}</p>
        </div>

        <!-- Final Prompt section -->
        <div>
            <label class="mb-1 block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Enhanced Prompt</label>
            <textarea id="enhanced-prompt-result" readonly class="w-full rounded-xl border border-slate-300/70 bg-white p-3 text-sm text-slate-900 shadow-sm focus:ring-2 focus:ring-sky-500/50 dark:border-white/10 dark:bg-slate-900 dark:text-slate-100 dark:focus:ring-sky-400/30 font-mono" rows="5">{{ enhanced_prompt }}</textarea>
        </div>
    </div>

    <footer class="flex justify-end gap-3 pt-2">
        <button type="button" class="inline-flex items-center justify-center rounded-xl border border-slate-300/70 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:bg-white/10" onclick="closeEnhancementPreview()">Discard</button>
        <button type="button" class="inline-flex items-center justify-center rounded-xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-sky-600/20 transition hover:bg-sky-500 active:scale-95" onclick="applyEnhancedPrompt()">Apply Changes</button>
    </footer>
</article>

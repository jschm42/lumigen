<div class="thumb-grid thumb-size-{{ thumb_size }}">
  {% for asset in page_data.items %}
  <article class="thumb-card">
    <a href="/assets/{{ asset.id }}"><img src="/assets/{{ asset.id }}/thumb" alt="thumb {{ asset.id }}"></a>
    <div class="thumb-meta">
      <a href="/assets/{{ asset.id }}">Asset #{{ asset.id }}</a>
      <small>{{ asset.generation.profile_name }} | {{ asset.generation.provider }}</small>
      <small>{{ asset.gallery_folder.path if asset.gallery_folder else "Root" }}</small>
    </div>
    <div class="thumb-actions">
      <a role="button" class="secondary" href="/assets/{{ asset.id }}/download">Download</a>
      <a role="button" class="secondary" href="/assets/{{ asset.id }}">Details</a>
    </div>
    <form method="post" action="/assets/{{ asset.id }}/move-folder" class="move-form">
      <div role="group">
        <select name="gallery_folder_id">
          <option value="">Root</option>
          {% for folder_item in filter_options.folders %}
            <option value="{{ folder_item.id }}" {% if asset.gallery_folder_id == folder_item.id %}selected{% endif %}>{{ folder_item.path }}</option>
          {% endfor %}
        </select>
        <input type="hidden" name="return_to" value="{{ return_to }}">
        <button type="submit">Move</button>
      </div>
    </form>
  </article>
  {% else %}
    <p class="muted">No assets found for current filters.</p>
  {% endfor %}
</div>

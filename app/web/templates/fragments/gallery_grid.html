<div id="gallery-grid" class="grid gap-2 {% if thumb_size == 'sm' %}grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6{% elif thumb_size == 'lg' %}grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4{% else %}grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5{% endif %}">
  {% for asset in page_data.items %}
  {% include "fragments/gallery_card.html" %}
  {% else %}
    <p class="col-span-full rounded-2xl border border-slate-300/75 bg-slate-100/80 px-4 py-3 text-sm text-slate-600 dark:border-white/10 dark:bg-slate-950/45 dark:text-slate-400">No assets found for current filters.</p>
  {% endfor %}

  {% if page_data.page < page_data.pages %}
  <div
    class="col-span-full flex items-center justify-center py-6 text-sm text-slate-400 dark:text-slate-500"
    hx-get="/gallery/items?page={{ page_data.page + 1 }}&{{ gallery_query }}&thumb_size={{ thumb_size | urlencode }}"
    hx-trigger="intersect once"
    hx-swap="outerHTML"
    data-gallery-sentinel
  >
    <span class="flex items-center gap-2"><i class="bi bi-arrow-clockwise animate-spin" aria-hidden="true"></i> Loading more…</span>
  </div>
  {% endif %}
</div>

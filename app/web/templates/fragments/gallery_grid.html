<div class="grid gap-3 {% if thumb_size == 'sm' %}grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6{% elif thumb_size == 'lg' %}grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4{% else %}grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5{% endif %}">
  {% for asset in page_data.items %}
  <article class="group relative overflow-hidden rounded-xl bg-slate-900/50 p-2.5 shadow-md shadow-slate-950/45 ring-offset-0 transition" data-gallery-card>
    <label class="absolute right-2 top-2 z-10 inline-flex h-7 w-7 items-center justify-center rounded-md border border-white/15 bg-slate-950/80">
      <input
        type="checkbox"
        name="asset_ids"
        value="{{ asset.id }}"
        form="bulk-action-form"
        data-gallery-select
        aria-label="Select asset {{ asset.id }}">
    </label>

    <a href="/assets/{{ asset.id }}" class="block overflow-hidden rounded-lg bg-slate-900/75">
      <img src="/assets/{{ asset.id }}/thumb" alt="thumb {{ asset.id }}" class="aspect-square w-full object-cover transition duration-300 group-hover:scale-[1.02]">
    </a>

    <div class="mt-3 space-y-1">
      <a href="/assets/{{ asset.id }}" class="block truncate text-sm font-semibold text-white hover:text-sky-200">Asset #{{ asset.id }}</a>
      <p class="truncate text-xs text-slate-400">{{ asset.generation.profile_name }} | {{ asset.generation.provider }}</p>
    </div>

    <div class="mt-3 flex items-center gap-2">
      <a href="/assets/{{ asset.id }}/download" aria-label="Download asset" title="Download" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-white/20 bg-white/5 text-slate-100 transition hover:border-sky-300/60 hover:text-sky-100">
        <span class="material-symbols-outlined" aria-hidden="true">download</span>
      </a>
      <a href="/assets/{{ asset.id }}" aria-label="View details" title="Details" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-white/20 bg-white/5 text-slate-100 transition hover:border-sky-300/60 hover:text-sky-100">
        <span class="material-symbols-outlined" aria-hidden="true">info</span>
      </a>
      <form method="post" action="/assets/{{ asset.id }}/delete" class="inline-flex" onsubmit="return confirm('Delete this asset?');">
        <input type="hidden" name="return_to" value="{{ return_to }}">
        <button type="submit" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-rose-300/40 bg-rose-500/10 text-rose-100 transition hover:border-rose-200 hover:bg-rose-500/20" aria-label="Delete asset" title="Delete">
          <span class="material-symbols-outlined" aria-hidden="true">delete</span>
        </button>
      </form>
    </div>
  </article>
  {% else %}
    <p class="col-span-full rounded-2xl border border-white/10 bg-slate-950/45 px-4 py-3 text-sm text-slate-400">No assets found for current filters.</p>
  {% endfor %}
</div>
